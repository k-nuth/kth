# KTH node configuration — example.
#
# Format: flat, dotted keys, one per line: `section.key = value`.
# Lines starting with `#` are comments. Every key below is optional; the value
# shown is the built-in default unless noted. Run `kth --settings` (`-s`) to dump
# the full effective configuration in this exact format.
#
# Start the node with:  kth --config kth.cfg   (or  kth -c kth.cfg)

# ---- database -------------------------------------------------------------
# Directory holding the blockchain database (relative to the working directory
# or absolute).
db.directory = blockchain
# Storage/indexation mode: pruned | blocks | full
# db.db_mode = blocks

# ---- network --------------------------------------------------------------
# TCP port to accept inbound peer connections on (mainnet default 8333).
net.inbound_port = 8333
# Maximum inbound / outbound peer connections.
net.inbound_connections = 8
net.outbound_connections = 8
# Persistent peers and DNS seeds (repeat the key to add more than one).
# net.peer = 1.2.3.4:8333
# net.seed = seed.example.org:8333

# ---- blockchain -----------------------------------------------------------
# Threads used for block validation (0 = auto).
# chain.cores = 0

# ---- node -----------------------------------------------------------------
# Display mode: tui | log | daemon
# node.display = log
