on:
  workflow_call:
    inputs:
      if:
        description: 'Whether to run this job'
        required: true
        type: boolean
      upload:
        description: 'Have to upload the package'
        required: true
        type: boolean
      os:
        required: true
        type: string
      image:
        required: true
        type: string
      recipe-name:
        required: true
        type: string
      conan-remote:
        required: true
        type: string
      compiler:
        required: true
        type: string
      compiler-version:
        required: true
        type: string
      build-version:
        required: true
        type: string
      enable-asan:
        description: 'Enable AddressSanitizer build'
        required: false
        type: boolean
        default: false
      enable-ubsan:
        description: 'Enable UndefinedBehaviorSanitizer build'
        required: false
        type: boolean
        default: false
      enable-tsan:
        description: 'Enable ThreadSanitizer build'
        required: false
        type: boolean
        default: false
      skip-tests:
        description: 'Skip unit test execution'
        required: false
        type: boolean
        default: true
      advisory:
        description: >-
          When true, non-passing Build / Package / Test steps are marked
          `continue-on-error: true` so the job still exits green. Used
          by the sanitizer matrix on `pull_request` events, where
          UBSan findings surface as annotations but must not block a
          merge (see main.yml). Job-level `continue-on-error` isn't
          allowed on reusable-workflow callers, so we plumb the
          advisory bit down to the step level here.
        required: false
        type: boolean
        default: false
    secrets:
      CONAN_LOGIN_USERNAME:
        required: true
      CONAN_PASSWORD:
        required: true
jobs:
  reusable-build-with-container:
    if: ${{ inputs.if }}
    runs-on: ${{ inputs.os }}
    container:
      image: ${{ inputs.image }}
    steps:
      - name: 🐛 Debug inputs
        run: |
          echo "inputs.conan-remote: ${{ inputs.conan-remote }}"
          echo "inputs.if: ${{ inputs.if }}"
          echo "inputs.os: ${{ inputs.os }}"
          echo "inputs.image: ${{ inputs.image }}"

          echo "inputs.conan-remote:       ${{ inputs.conan-remote }}"
          echo "inputs.recipe-name:        ${{ inputs.recipe-name }}"

          echo "inputs.compiler:           ${{ inputs.compiler }}"
          echo "inputs.compiler-version:   ${{ inputs.compiler-version }}"

          echo "inputs.version-file:       ${{ inputs.version-file }}"
          echo "inputs.upload:             ${{ inputs.upload }}"
          # echo "github.event_name:         ${{ github.event_name }}"


      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: true

      # Split restore/save so a flaky GH Cache Service can't fail
      # the whole job during the post-action. See `coverage.yml`
      # for the longer rationale; the short version is that the
      # save POSTs to the cache service have been timing out at
      # 18+ min and marking otherwise-green jobs as `failure`.
      - name: 💾 Restore Conan packages
        id: restore-conan
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan2-${{ hashFiles('**/conan.lock') }}
      # - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}


      # - if: ${{ inputs.compiler != 'GCC' }}
      #   uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      #   with:
      #     python-version: '3.11'

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20.x'

      - name: 🔧 Setup Conan
        uses: ./ci_utils/.github/actions/setup-conan
      - name: 🔧 Setup kthbuild
        uses: ./ci_utils/.github/actions/setup-kthbuild
      - name: 🔧 Get CMake
        uses: lukka/get-cmake@6d674ef0d7703f12f77182ca400e1e7be99fd399

      # - uses: github/codeql-action/init@v2
      #   with:
      #     languages: 'cpp'

      - name: 🔧 Replace version
        uses: ./ci_utils/.github/actions/replace-version-monorepo
        with:
          new-version: ${{ inputs.build-version }}

      - name: 🗄️ Setup ccache
        if: ${{ inputs.upload != true }}
        run: |
          apt-get update -qq && apt-get install -y -qq ccache > /dev/null 2>&1 || true
          ccache --version || true

      - name: 🗄️ Restore ccache
        id: restore-ccache
        if: ${{ inputs.upload != true }}
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /github/home/.cache/ccache
          # Two disjoint cache families: 'sanitizers' and 'clean'. Sanitizer
          # flags change every compile command, so a sanitizer cache
          # restored into a non-sanitizer build (or vice-versa) produces
          # ~0 hits. The explicit suffix keeps `restore-keys`' prefix
          # match from leaking between families.
          #
          # The primary key ends in `${{ github.run_id }}` so it is
          # guaranteed *not* to be an exact restore hit — this is
          # deliberate. Previously the key ended in
          # `hashFiles('conanfile.py')`, which almost never changed
          # between runs, so the sibling save step (gated on
          # `cache-hit != 'true'`) was always skipped and the on-disk
          # cache stayed pinned to whatever the first run wrote
          # (Hits: 0 / 1090 = 0.00% on master's Linux Build & Test).
          # With the run_id-suffixed key, restore always falls through
          # to `restore-keys` and picks the most-recently-saved family
          # member; the save step below then writes back the freshly
          # populated cache. GHA's LRU eviction keeps total per-repo
          # cache under the 10 GB cap.
          key: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}-

      - name: 🔨 Build
        # See `advisory` input above: PR sanitizer runs pass regardless
        # of failure so the workflow exits green while still surfacing
        # the finding on the job.
        continue-on-error: ${{ inputs.advisory }}
        working-directory: .
        env:
          # Without these, ccache hashes absolute paths, the compiler
          # binary's mtime, and the working directory into every
          # translation-unit key. The container-runner's paths and mtimes
          # shift between runs, so ~80% of files fell through to a "miss"
          # even when a warm cache had been restored (measured: 18% hits
          # in a real Linux Build & Test run, ~80 min build). Same fix
          # already applied to the macOS caller (build-without-container.yml).
          #
          # - `BASEDIR`: rewrite workspace paths to be relative before hashing.
          # - `NOHASHDIR`: don't hash the CWD at all — it changes per run.
          # - `COMPILERCHECK=content`: key off the compiler binary's SHA,
          #   not its mtime + path.
          # - `SLOPPINESS`: ignore benign per-run drift (system-header
          #   timestamps, __TIME__/__DATE__, locale sensitivity, PCH,
          #   include-file ctime/mtime).
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
          CCACHE_NOHASHDIR: "true"
          CCACHE_SLOPPINESS: pch_defines,time_macros,locale,system_headers,include_file_mtime,include_file_ctime
        run: |
          # Prepare sanitizer flags
          SANITIZER_FLAGS=""
          BUILD_SUFFIX=""
          
          # Check for conflicting sanitizers (AddressSanitizer and ThreadSanitizer are mutually exclusive)
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            echo "⚠️ WARNING: AddressSanitizer and ThreadSanitizer are mutually exclusive"
            echo "🔧 Prioritizing AddressSanitizer and disabling ThreadSanitizer"
            TSAN_ENABLED=false
          else
            TSAN_ENABLED="${{ inputs.enable-tsan }}"
          fi
          
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "🧪 Enabling AddressSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=address -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-asan"
          fi
          
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "🧪 Enabling UndefinedBehaviorSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=undefined -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-ubsan"
          fi
          
          if [ "$TSAN_ENABLED" = "true" ]; then
            echo "🧪 Enabling ThreadSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=thread"
            BUILD_SUFFIX="${BUILD_SUFFIX}-tsan"
          fi
          
          # Set environment variables for sanitizers
          if [ -n "$SANITIZER_FLAGS" ]; then
            echo "🔧 Using sanitizer flags: $SANITIZER_FLAGS"
            export CXXFLAGS="$CXXFLAGS $SANITIZER_FLAGS"
            export CFLAGS="$CFLAGS $SANITIZER_FLAGS"
            export LDFLAGS="$LDFLAGS $SANITIZER_FLAGS"
          fi
          
          # secp256k1's `field_5x52_asm_impl.h` reserves enough registers
          # that ASan's shadow-register pressure pushes it over the limit
          # and the compile fails with "'asm' operand has impossible
          # constraints or there are not enough registers". When ASan is
          # active fall back to the C path for that module. UBSan alone
          # is fine.
          EXTRA_CONAN_OPTS=""
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            EXTRA_CONAN_OPTS="-o secp256k1_use_asm=False"
          fi

          # Choose build strategy based on whether we need to upload
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "🚀 Release build - using conan create (includes package validation)"
            conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh $EXTRA_CONAN_OPTS
            conan create conanfile.py --version ${{ inputs.build-version }} --lockfile=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd --build=missing -o march_id=ZLm9Pjh -o tests=False $EXTRA_CONAN_OPTS
          else
            echo "🔨 Development build - direct compilation with tests"
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh $EXTRA_CONAN_OPTS
            conan install conanfile.py --lockfile=build/conan.lock -of build --build=missing -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh -o tests=True $EXTRA_CONAN_OPTS
            
            CCACHE_OPT=""
            if command -v ccache &>/dev/null; then
              export PATH="/usr/lib/ccache:$PATH"
              ccache --zero-stats
              CCACHE_OPT="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
            fi

            cmake --preset conan-release \
                 -DCMAKE_VERBOSE_MAKEFILE=ON \
                 -DGLOBAL_BUILD=ON \
                 -DENABLE_TEST=ON \
                 -DCMAKE_BUILD_TYPE=Release \
                 $CCACHE_OPT

            cmake --build --preset conan-release -j"$(nproc)"

            if command -v ccache &>/dev/null; then
              ccache --show-stats
            fi
          fi

      # Persist caches as soon as the build finishes — saves get the
      # most benefit on every run (even ones where tests fail later).
      # `continue-on-error` keeps a flaky GH Cache Service save from
      # failing the whole job; the failure becomes a non-fatal
      # warning rather than the 18+ min hangs we've been seeing on
      # the post-action.
      # `key` reuses the restore step's cache-primary-key output —
      # `hashFiles('**/conan.lock')` would re-evaluate here against
      # the post-build tree (`build/conan.lock` now exists) and
      # produce a different hash than at restore time, causing
      # every save to land under a fresh key the next restore can
      # never match. The restore step is also the right ground
      # truth for whether to save (`cache-hit != 'true'`), and the
      # save deliberately runs for both regular and upload jobs —
      # there's no reason to deny upload jobs the chance to
      # repopulate a cold conan cache.
      - name: 💾 Save Conan packages
        if: always() && steps.restore-conan.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: ${{ steps.restore-conan.outputs.cache-primary-key }}

      - name: 🗄️ Save ccache
        # Save on every non-upload run. The old gate
        # `cache-hit != 'true'` skipped saves for every run whose
        # `conanfile.py`-hashed key already existed, freezing the cache
        # at whatever the first run wrote. The primary key now includes
        # `github.run_id` so it's unique per run, cache-hit is never
        # `'true'`, and the save actually runs — but the gate stays as
        # documentation of the invariant we want (save only when we
        # have something new to save).
        if: always() && inputs.upload != true && steps.restore-ccache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /github/home/.cache/ccache
          key: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}-${{ github.run_id }}

      - name: 📊 Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.build-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "**Container Image:** ${{ inputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** ${{ inputs.compiler }} ${{ inputs.compiler-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build type
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "**Build Type:** Release build (with package validation)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** Yes" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build Type:** Development build (with tests)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** No" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Sanitizers
          SANITIZERS_ENABLED=false
          echo "**Sanitizers:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "- AddressSanitizer (ASan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "- UndefinedBehaviorSanitizer (UBSan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-tsan }}" = "true" ]; then
            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              echo "- ThreadSanitizer (TSan): Disabled (conflicts with ASan)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ThreadSanitizer (TSan): Enabled" >> $GITHUB_STEP_SUMMARY
              SANITIZERS_ENABLED=true
            fi
          fi
          if [ "$SANITIZERS_ENABLED" = "false" ]; then
            echo "- None enabled" >> $GITHUB_STEP_SUMMARY
          fi

      # Test phase — split per binary instead of one ctest invocation.
      #
      # The single-step `ctest` setup ended with the GHA runner annotation
      # "The hosted runner lost communication with the server... starves
      # it for CPU/Memory" on a non-trivial fraction of runs, and when it
      # happened the test step archived ZERO output. Splitting per binary
      # made it observable: the last step that *started* identifies the
      # culprit. Root cause turned out to be `kth_capi_test` — its death
      # tests fork() + abort() the binary ~50 times, and the kernel core-
      # dump pass (RLIMIT_CORE=unlimited, core_pattern piped to a handler
      # absent inside the container) hangs waiting for the handler. With
      # ~50 death tests per run that's enough to wedge the runner.
      # Fixed properly in `src/c-api/test/test_helpers.hpp` (`RLIMIT_CORE=0`
      # in the child); the split + `--kill-after` here is defence in depth
      # so a single hung binary can't take the whole job down again.
      #
      # Order is cheap → heavy (kth_domain_test last) so when the runner
      # does die mid-run we lose the least diagnostic data.
      - name: 🧪 Pre-test diagnostics
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        run: |
          echo "=== mem before tests ==="; free -m || true
          echo "=== dmesg tail before tests ==="; dmesg | tail -20 2>/dev/null || true

          # Sanitizer runtime options (preserve conflict resolution from build).
          TSAN_ENABLED_FOR_TESTS="${{ inputs.enable-tsan }}"
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            TSAN_ENABLED_FOR_TESTS=false
          fi
          {
            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              echo 'ASAN_OPTIONS=detect_leaks=1:abort_on_error=1:print_stats=1'
            fi
            if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
              echo 'UBSAN_OPTIONS=print_stacktrace=1:abort_on_error=1'
            fi
            if [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
              echo 'TSAN_OPTIONS=halt_on_error=1:abort_on_error=1'
            fi
          } >> "$GITHUB_ENV"

      # Each test step captures the test binary's exit code via `|| rc=$?`
      # instead of swallowing it with `|| echo`. The step itself still exits
      # 0 so the remaining steps run (we want every binary to report, not
      # short-circuit on the first failure), but a non-zero rc is recorded
      # in $GITHUB_ENV. The final gate step reads that and fails the job
      # so the workflow correctly surfaces test failures.
      - name: 🧪 secp256k1 (tests + exhaustive)
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          rc=0
          timeout --kill-after=30 300 ./src/secp256k1/secp256k1-tests || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::secp256k1-tests failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi
          rc=0
          timeout --kill-after=30 600 ./src/secp256k1/secp256k1-exhaustive_tests || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::secp256k1-exhaustive_tests failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 kth_infrastructure_test (+ compile-fail)
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          rc=0
          timeout --kill-after=30 300 ./src/infrastructure/kth_infrastructure_test --reporter compact || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_infrastructure_test failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi
          # The Python compile-fail test is registered via add_test(); run it
          # through ctest so we keep its environment exactly as defined in
          # src/infrastructure/CMakeLists.txt.
          rc=0
          timeout --kill-after=30 120 ctest --output-on-failure -R '^kth_infrastructure_compile_fail_tests$' || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_infrastructure_compile_fail_tests failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 kth_blockchain_test (vmlimits)
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          rc=0
          timeout --kill-after=30 300 ./src/blockchain/kth_blockchain_test --reporter compact || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_blockchain_test failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 kth_node_test
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          rc=0
          timeout --kill-after=30 300 ./src/node/kth_node_test --reporter compact || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_node_test failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 kth_capi_test
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          # The c-api subdir is conditionally built (e.g. disabled on the
          # version1/v1.0 coroutine branch until c-api is migrated). Skip
          # silently if the binary wasn't produced — keep the gate strict
          # when it IS produced.
          if [ ! -x ./src/c-api/kth_capi_test ]; then
            echo "kth_capi_test not built — skipping."
            exit 0
          fi
          rc=0
          timeout --kill-after=30 300 ./src/c-api/kth_capi_test --reporter compact || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_capi_test failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 kth_domain_test (heaviest — VMB auto suite)
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: build/build/Release
        run: |
          rc=0
          timeout --kill-after=30 1500 ./src/domain/kth_domain_test --reporter compact || rc=$?
          if [ "$rc" != 0 ]; then
            echo "::error::kth_domain_test failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      - name: 🧪 Post-test diagnostics
        if: ${{ always() && inputs.skip-tests != true && inputs.upload != true }}
        run: |
          echo "=== mem after tests ==="; free -m || true
          echo "=== dmesg tail after tests ==="; dmesg | tail -40 2>/dev/null || true
          echo "=== processes still alive ==="; ps -eo pid,ppid,rss,comm --sort=-rss | head -20 || true

      # Gate that turns the recorded test failures into a job failure.
      # Runs unconditionally (`always()`) so it fires even if an earlier
      # step ended in failure for an unrelated reason.
      - name: 🧪 Test results gate
        if: ${{ always() && inputs.skip-tests != true && inputs.upload != true }}
        run: |
          if [ "${TESTS_FAILED:-0}" = "1" ]; then
            echo "::error::One or more test binaries failed or timed out (see annotations above)"
            exit 1
          fi
          echo "All test binaries passed"

      - name: ⏭️ Skip tests info
        if: ${{ inputs.skip-tests == true }}
        run: |
          echo "⏭️ Unit tests skipped (skip-tests=true)"
          
      - name: 🚀 Release build info
        if: ${{ inputs.upload == true }}
        run: |
          echo "🚀 Release build completed - package validation included in conan create"
          echo "📦 Package ready for upload"

      # - uses: github/codeql-action/analyze@v2

      - name: 📦 Upload
        # if: github.event_name == 'push' && needs.check.outputs.permitted == 'true'
        if: ${{ inputs.upload }}
        run: |
          conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
          conan upload ${{ inputs.recipe-name }}/${{ inputs.build-version }}@ -r ${{ inputs.conan-remote }} # --all
