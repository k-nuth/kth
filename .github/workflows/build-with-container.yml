on:
  workflow_call:
    inputs:
      if:
        description: 'Whether to run this job'
        required: true
        type: boolean
      upload:
        description: 'Have to upload the package'
        required: true
        type: boolean
      os:
        required: true
        type: string
      image:
        required: true
        type: string
      recipe-name:
        required: true
        type: string
      conan-remote:
        required: true
        type: string
      compiler:
        required: true
        type: string
      compiler-version:
        required: true
        type: string
      build-version:
        required: true
        type: string
      enable-asan:
        description: 'Enable AddressSanitizer build'
        required: false
        type: boolean
        default: false
      enable-ubsan:
        description: 'Enable UndefinedBehaviorSanitizer build'
        required: false
        type: boolean
        default: false
      enable-tsan:
        description: 'Enable ThreadSanitizer build'
        required: false
        type: boolean
        default: false
      skip-tests:
        description: 'Skip unit test execution'
        required: false
        type: boolean
        default: true
    secrets:
      CONAN_LOGIN_USERNAME:
        required: true
      CONAN_PASSWORD:
        required: true
jobs:
  reusable-build-with-container:
    if: ${{ inputs.if }}
    runs-on: ${{ inputs.os }}
    container:
      image: ${{ inputs.image }}
    steps:
      - name: 🐛 Debug inputs
        run: |
          echo "inputs.conan-remote: ${{ inputs.conan-remote }}"
          echo "inputs.if: ${{ inputs.if }}"
          echo "inputs.os: ${{ inputs.os }}"
          echo "inputs.image: ${{ inputs.image }}"

          echo "inputs.conan-remote:       ${{ inputs.conan-remote }}"
          echo "inputs.recipe-name:        ${{ inputs.recipe-name }}"

          echo "inputs.compiler:           ${{ inputs.compiler }}"
          echo "inputs.compiler-version:   ${{ inputs.compiler-version }}"

          echo "inputs.version-file:       ${{ inputs.version-file }}"
          echo "inputs.upload:             ${{ inputs.upload }}"
          # echo "github.event_name:         ${{ github.event_name }}"


      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # Split restore/save so a flaky GH Cache Service can't fail
      # the whole job during the post-action. See `coverage.yml`
      # for the longer rationale; the short version is that the
      # save POSTs to the cache service have been timing out at
      # 18+ min and marking otherwise-green jobs as `failure`.
      - name: 💾 Restore Conan packages
        id: restore-conan
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan/data
          key: ${{ runner.os }}-${{ hashFiles('**/conan.lock') }}
      # - uses: actions/cache@v5
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}


      # - if: ${{ inputs.compiler != 'GCC' }}
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.11'

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20.x'

      - name: 🔧 Setup Conan
        uses: ./ci_utils/.github/actions/setup-conan
      - name: 🔧 Setup kthbuild
        uses: ./ci_utils/.github/actions/setup-kthbuild
      - name: 🔧 Get CMake
        uses: lukka/get-cmake@6d674ef0d7703f12f77182ca400e1e7be99fd399

      # - uses: github/codeql-action/init@v2
      #   with:
      #     languages: 'cpp'

      - name: 🔧 Replace version
        uses: ./ci_utils/.github/actions/replace-version-monorepo
        with:
          new-version: ${{ inputs.build-version }}

      - name: 🗄️ Setup ccache
        if: ${{ inputs.upload != true }}
        run: |
          apt-get update -qq && apt-get install -y -qq ccache > /dev/null 2>&1 || true
          ccache --version || true

      - name: 🗄️ Restore ccache
        id: restore-ccache
        if: ${{ inputs.upload != true }}
        uses: actions/cache/restore@v5
        with:
          path: /github/home/.cache/ccache
          key: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-

      - name: 🔨 Build
        working-directory: .
        run: |
          # Prepare sanitizer flags
          SANITIZER_FLAGS=""
          BUILD_SUFFIX=""
          
          # Check for conflicting sanitizers (AddressSanitizer and ThreadSanitizer are mutually exclusive)
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            echo "⚠️ WARNING: AddressSanitizer and ThreadSanitizer are mutually exclusive"
            echo "🔧 Prioritizing AddressSanitizer and disabling ThreadSanitizer"
            TSAN_ENABLED=false
          else
            TSAN_ENABLED="${{ inputs.enable-tsan }}"
          fi
          
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "🧪 Enabling AddressSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=address -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-asan"
          fi
          
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "🧪 Enabling UndefinedBehaviorSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=undefined -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-ubsan"
          fi
          
          if [ "$TSAN_ENABLED" = "true" ]; then
            echo "🧪 Enabling ThreadSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=thread"
            BUILD_SUFFIX="${BUILD_SUFFIX}-tsan"
          fi
          
          # Set environment variables for sanitizers
          if [ -n "$SANITIZER_FLAGS" ]; then
            echo "🔧 Using sanitizer flags: $SANITIZER_FLAGS"
            export CXXFLAGS="$CXXFLAGS $SANITIZER_FLAGS"
            export CFLAGS="$CFLAGS $SANITIZER_FLAGS"
            export LDFLAGS="$LDFLAGS $SANITIZER_FLAGS"
          fi
          
          # Choose build strategy based on whether we need to upload
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "🚀 Release build - using conan create (includes package validation)"
            conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh
            conan create conanfile.py --version ${{ inputs.build-version }} --lockfile=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd --build=missing -o march_id=ZLm9Pjh -o tests=False
          else
            echo "🔨 Development build - direct compilation with tests"
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh
            conan install conanfile.py --lockfile=build/conan.lock -of build --build=missing -pr:b linux-ci-cd -pr:h linux-ci-cd -o march_id=ZLm9Pjh -o tests=True
            
            CCACHE_OPT=""
            if command -v ccache &>/dev/null; then
              export PATH="/usr/lib/ccache:$PATH"
              ccache --zero-stats
              CCACHE_OPT="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
            fi

            cmake --preset conan-release \
                 -DCMAKE_VERBOSE_MAKEFILE=ON \
                 -DGLOBAL_BUILD=ON \
                 -DENABLE_TEST=ON \
                 -DCMAKE_BUILD_TYPE=Release \
                 $CCACHE_OPT

            cmake --build --preset conan-release -j4

            if command -v ccache &>/dev/null; then
              ccache --show-stats
            fi
          fi

      # Persist caches as soon as the build finishes — saves get the
      # most benefit on every run (even ones where tests fail later).
      # `continue-on-error` keeps a flaky GH Cache Service save from
      # failing the whole job; the failure becomes a non-fatal
      # warning rather than the 18+ min hangs we've been seeing on
      # the post-action.
      # `key` reuses the restore step's cache-primary-key output —
      # `hashFiles('**/conan.lock')` would re-evaluate here against
      # the post-build tree (`build/conan.lock` now exists) and
      # produce a different hash than at restore time, causing
      # every save to land under a fresh key the next restore can
      # never match. The restore step is also the right ground
      # truth for whether to save (`cache-hit != 'true'`), and the
      # save deliberately runs for both regular and upload jobs —
      # there's no reason to deny upload jobs the chance to
      # repopulate a cold conan cache.
      - name: 💾 Save Conan packages
        if: always() && steps.restore-conan.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/.conan/data
          key: ${{ steps.restore-conan.outputs.cache-primary-key }}

      - name: 🗄️ Save ccache
        if: always() && inputs.upload != true && steps.restore-ccache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: /github/home/.cache/ccache
          key: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ github.sha }}

      - name: 📊 Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.build-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "**Container Image:** ${{ inputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** ${{ inputs.compiler }} ${{ inputs.compiler-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build type
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "**Build Type:** Release build (with package validation)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** Yes" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build Type:** Development build (with tests)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** No" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Sanitizers
          SANITIZERS_ENABLED=false
          echo "**Sanitizers:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "- AddressSanitizer (ASan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "- UndefinedBehaviorSanitizer (UBSan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-tsan }}" = "true" ]; then
            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              echo "- ThreadSanitizer (TSan): Disabled (conflicts with ASan)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ThreadSanitizer (TSan): Enabled" >> $GITHUB_STEP_SUMMARY
              SANITIZERS_ENABLED=true
            fi
          fi
          if [ "$SANITIZERS_ENABLED" = "false" ]; then
            echo "- None enabled" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🧪 Run unit tests
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: .
        run: |
          echo "🧪 Running unit tests for development build..."
          
          # Set sanitizer options for better reporting (preserve conflict resolution from build step)
          TSAN_ENABLED_FOR_TESTS="${{ inputs.enable-tsan }}"
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            TSAN_ENABLED_FOR_TESTS=false
          fi
          
          if [ "${{ inputs.enable-asan }}" = "true" ] || [ "${{ inputs.enable-ubsan }}" = "true" ] || [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
            echo "🧪 Running tests with sanitizers enabled..."
            echo "⚠️ Tests may run slower due to sanitizer overhead"
            
            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              export ASAN_OPTIONS="detect_leaks=1:abort_on_error=1:print_stats=1"
            fi
            
            if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
              export UBSAN_OPTIONS="print_stacktrace=1:abort_on_error=1"
            fi
            
            if [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
              export TSAN_OPTIONS="halt_on_error=1:abort_on_error=1"
            fi
          fi
          
          # Run unit tests (project was already built with tests in previous step)
          cd build/build/Release
          
          if [ "${{ inputs.enable-asan }}" = "true" ] || [ "${{ inputs.enable-ubsan }}" = "true" ] || [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
            timeout 1800 ctest --output-on-failure --parallel 2 || echo "Some tests may have failed or timed out with sanitizers"
          else
            ctest --output-on-failure --parallel 4 || echo "Some tests may have failed, but continuing..."
          fi

      - name: ⏭️ Skip tests info
        if: ${{ inputs.skip-tests == true }}
        run: |
          echo "⏭️ Unit tests skipped (skip-tests=true)"
          
      - name: 🚀 Release build info
        if: ${{ inputs.upload == true }}
        run: |
          echo "🚀 Release build completed - package validation included in conan create"
          echo "📦 Package ready for upload"

      # - uses: github/codeql-action/analyze@v2

      - name: 📦 Upload
        # if: github.event_name == 'push' && needs.check.outputs.permitted == 'true'
        if: ${{ inputs.upload }}
        run: |
          conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
          conan upload ${{ inputs.recipe-name }}/${{ inputs.build-version }}@ -r ${{ inputs.conan-remote }} # --all
