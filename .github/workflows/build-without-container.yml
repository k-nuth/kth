on:
  workflow_call:
    inputs:
      if:
        description: 'Whether to run this job'
        required: true
        type: boolean
      upload:
        description: 'Have to upload the package'
        required: true
        type: boolean
      os:
        required: true
        type: string
      recipe-name:
        required: true
        type: string
      conan-remote:
        required: true
        type: string
      compiler:
        required: true
        type: string
      compiler-version:
        required: true
        type: string
      build-version:
        required: true
        type: string
      enable-asan:
        description: 'Enable AddressSanitizer build'
        required: false
        type: boolean
        default: false
      enable-ubsan:
        description: 'Enable UndefinedBehaviorSanitizer build'
        required: false
        type: boolean
        default: false
      enable-tsan:
        description: 'Enable ThreadSanitizer build'
        required: false
        type: boolean
        default: false
      skip-tests:
        description: 'Skip unit test execution'
        required: false
        type: boolean
        default: true
    secrets:
      CONAN_LOGIN_USERNAME:
        required: true
      CONAN_PASSWORD:
        required: true
jobs:
  reusable-build-without-container:
    if: ${{ inputs.if }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: 🐛 Debug inputs
        run: |
          echo "inputs.conan-remote: ${{ inputs.conan-remote }}"
          echo "inputs.if: ${{ inputs.if }}"
          echo "inputs.os: ${{ inputs.os }}"

          echo "inputs.conan-remote:       ${{ inputs.conan-remote }}"
          echo "inputs.recipe-name:        ${{ inputs.recipe-name }}"

          echo "inputs.compiler:           ${{ inputs.compiler }}"
          echo "inputs.compiler-version:   ${{ inputs.compiler-version }}"

          echo "inputs.version-file:       ${{ inputs.version-file }}"
          echo "inputs.upload:             ${{ inputs.upload }}"
          # echo "github.event_name:         ${{ github.event_name }}"

      # ----------------------------------------------------------------

      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          submodules: true

      - name: 💾 Cache Conan packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan2-${{ hashFiles('**/conan.lock') }}
      # - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}


      # - if: ${{ inputs.compiler != 'GCC' }}
      - name: 🐍 Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: 🔧 Setup Conan
        uses: ./ci_utils/.github/actions/setup-conan
      - name: 🔧 Setup kthbuild
        uses: ./ci_utils/.github/actions/setup-kthbuild
      - name: 🔧 Get CMake
        uses: lukka/get-cmake@6d674ef0d7703f12f77182ca400e1e7be99fd399

      # - uses: github/codeql-action/init@v2
      #   with:
      #     languages: 'cpp'

      - name: 🔧 Replace version
        uses: ./ci_utils/.github/actions/replace-version-monorepo
        with:
          new-version: ${{ inputs.build-version }}

      - name: 🗄️ Setup ccache
        if: ${{ inputs.upload != true }}
        run: |
          brew install ccache 2>/dev/null || true
          ccache --version || true

      - name: 🗄️ Restore ccache
        if: ${{ inputs.upload != true }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/Library/Caches/ccache
          # Two disjoint cache families ('sanitizers' / 'clean') so the
          # restore-keys' prefix match can't leak across families.
          key: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}-

      - name: 🔨 Build
        working-directory: .
        env:
          # Hosted macOS runners change the workspace path between runs
          # (`/Users/runner/work/_temp/<random>/…`), and apple-clang is
          # invoked from `/Applications/Xcode_*.app/Contents/…`. Without
          # the overrides below ccache hashes those absolute paths into
          # its "Direct" key, falls through to "Preprocessed" mode for
          # every TU and ends up at ~6 % hit rate — the build re-runs
          # nearly from scratch. `CCACHE_BASEDIR` rewrites paths under
          # the workspace to be relative before hashing; `compilercheck=
          # content` keys off the compiler binary's contents instead of
          # its mtime/path; the sloppiness list ignores macros that
          # vary across runs but don't change generated code.
          #
          # Even with those, the previous fix attempt only got us to
          # ~6 % hits. Adding `CCACHE_NOHASHDIR=true` so the working
          # directory isn't part of the hash (it changes between runs
          # on macOS-hosted runners regardless of BASEDIR), and
          # `CCACHE_LOGFILE` so we can post-mortem when hits stay low.
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
          CCACHE_NOHASHDIR: "true"
          CCACHE_SLOPPINESS: pch_defines,time_macros,locale,system_headers,include_file_mtime,include_file_ctime
          CCACHE_LOGFILE: ${{ github.workspace }}/ccache.log
        run: |
          # Prepare sanitizer flags
          SANITIZER_FLAGS=""
          BUILD_SUFFIX=""
          
          # Check for conflicting sanitizers (AddressSanitizer and ThreadSanitizer are mutually exclusive)
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            echo "⚠️ WARNING: AddressSanitizer and ThreadSanitizer are mutually exclusive"
            echo "🔧 Prioritizing AddressSanitizer and disabling ThreadSanitizer"
            TSAN_ENABLED=false
          else
            TSAN_ENABLED="${{ inputs.enable-tsan }}"
          fi
          
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "🧪 Enabling AddressSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=address -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-asan"
          fi
          
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "🧪 Enabling UndefinedBehaviorSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=undefined -fno-omit-frame-pointer"
            BUILD_SUFFIX="${BUILD_SUFFIX}-ubsan"
          fi
          
          if [ "$TSAN_ENABLED" = "true" ]; then
            echo "🧪 Enabling ThreadSanitizer build"
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize=thread"
            BUILD_SUFFIX="${BUILD_SUFFIX}-tsan"
          fi
          
          # Set environment variables for sanitizers
          if [ -n "$SANITIZER_FLAGS" ]; then
            echo "🔧 Using sanitizer flags: $SANITIZER_FLAGS"
            export CXXFLAGS="$CXXFLAGS $SANITIZER_FLAGS"
            export CFLAGS="$CFLAGS $SANITIZER_FLAGS"
            export LDFLAGS="$LDFLAGS $SANITIZER_FLAGS"
          fi
          
          # Choose build strategy based on whether we need to upload
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "🚀 Release build - using conan create (includes package validation)"
            conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b general-ci-cd -pr:h general-ci-cd
            conan create conanfile.py --version ${{ inputs.build-version }} --lockfile=build/conan.lock -pr:b general-ci-cd -pr:h general-ci-cd --build=missing -o tests=False
          else
            echo "🔨 Development build - direct compilation with tests"
            conan lock create conanfile.py --version ${{ inputs.build-version }} --lockfile=conan.lock --lockfile-out=build/conan.lock -pr:b general-ci-cd -pr:h general-ci-cd
            conan install conanfile.py --lockfile=build/conan.lock -of build --build=missing -pr:b general-ci-cd -pr:h general-ci-cd -o tests=True
            
            CCACHE_OPT=""
            if command -v ccache &>/dev/null; then
              ccache --zero-stats
              CCACHE_OPT="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
            fi

            cmake --preset conan-release \
                 -DCMAKE_VERBOSE_MAKEFILE=ON \
                 -DGLOBAL_BUILD=ON \
                 -DENABLE_TEST=ON \
                 -DCMAKE_BUILD_TYPE=Release \
                 $CCACHE_OPT

            cmake --build --preset conan-release -j4

            if command -v ccache &>/dev/null; then
              ccache --show-stats
            fi
          fi

      - name: 📊 Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.build-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** ${{ inputs.compiler }} ${{ inputs.compiler-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build type
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo "**Build Type:** Release build (with package validation)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** Yes" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build Type:** Development build (with tests)" >> $GITHUB_STEP_SUMMARY
            echo "**Uploaded to Conan:** No" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Sanitizers
          SANITIZERS_ENABLED=false
          echo "**Sanitizers:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.enable-asan }}" = "true" ]; then
            echo "- AddressSanitizer (ASan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
            echo "- UndefinedBehaviorSanitizer (UBSan): Enabled" >> $GITHUB_STEP_SUMMARY
            SANITIZERS_ENABLED=true
          fi
          if [ "${{ inputs.enable-tsan }}" = "true" ]; then
            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              echo "- ThreadSanitizer (TSan): Disabled (conflicts with ASan)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ThreadSanitizer (TSan): Enabled" >> $GITHUB_STEP_SUMMARY
              SANITIZERS_ENABLED=true
            fi
          fi
          if [ "$SANITIZERS_ENABLED" = "false" ]; then
            echo "- None enabled" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🧪 Run unit tests
        if: ${{ inputs.skip-tests != true && inputs.upload != true }}
        working-directory: .
        run: |
          echo "🧪 Running unit tests for development build..."

          # Set sanitizer options for better reporting (preserve conflict resolution from build step)
          TSAN_ENABLED_FOR_TESTS="${{ inputs.enable-tsan }}"
          if [ "${{ inputs.enable-asan }}" = "true" ] && [ "${{ inputs.enable-tsan }}" = "true" ]; then
            TSAN_ENABLED_FOR_TESTS=false
          fi

          if [ "${{ inputs.enable-asan }}" = "true" ] || [ "${{ inputs.enable-ubsan }}" = "true" ] || [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
            echo "🧪 Running tests with sanitizers enabled..."
            echo "⚠️ Tests may run slower due to sanitizer overhead"

            if [ "${{ inputs.enable-asan }}" = "true" ]; then
              export ASAN_OPTIONS="detect_leaks=1:abort_on_error=1:print_stats=1"
            fi

            if [ "${{ inputs.enable-ubsan }}" = "true" ]; then
              export UBSAN_OPTIONS="print_stacktrace=1:abort_on_error=1"
            fi

            if [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
              export TSAN_OPTIONS="halt_on_error=1:abort_on_error=1"
            fi
          fi

          # Run unit tests (project was already built with tests in previous step).
          # Capture rc instead of swallowing it with `|| echo`; the step itself
          # still exits 0 so the rest of the workflow can run, but a non-zero
          # rc is recorded in $GITHUB_ENV and the gate step below fails the
          # job. Mirrors the pattern in build-with-container.yml.
          cd build/build/Release
          rc=0
          if [ "${{ inputs.enable-asan }}" = "true" ] || [ "${{ inputs.enable-ubsan }}" = "true" ] || [ "$TSAN_ENABLED_FOR_TESTS" = "true" ]; then
            timeout 1800 ctest --output-on-failure --parallel 2 || rc=$?
          else
            ctest --output-on-failure --parallel 4 || rc=$?
          fi
          if [ "$rc" != 0 ]; then
            echo "::error::ctest failed or timed out (exit=$rc)"
            echo 'TESTS_FAILED=1' >> "$GITHUB_ENV"
          fi

      # Gate that turns the recorded test failure into a job failure.
      # Runs unconditionally (`always()`) so it fires even when an earlier
      # step ended in failure for an unrelated reason.
      - name: 🧪 Test results gate
        if: ${{ always() && inputs.skip-tests != true && inputs.upload != true }}
        run: |
          if [ "${TESTS_FAILED:-0}" = "1" ]; then
            echo "::error::ctest failed or timed out (see annotations above)"
            exit 1
          fi
          echo "All tests passed"

      # ccache log helps diagnose hit-rate problems on macOS-hosted
      # runners — upload it as an artifact so we can post-mortem the
      # next time hits stay low. Cheap when ccache.log doesn't exist.
      - name: 📤 Upload ccache log
        if: ${{ always() && inputs.upload != true }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        continue-on-error: true
        with:
          name: ccache-log-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.compiler-version }}-${{ (inputs.enable-asan || inputs.enable-ubsan || inputs.enable-tsan) && 'sanitizers' || 'clean' }}
          path: ${{ github.workspace }}/ccache.log
          if-no-files-found: ignore
          retention-days: 7

      - name: ⏭️ Skip tests info
        if: ${{ inputs.skip-tests == true }}
        run: |
          echo "⏭️ Unit tests skipped (skip-tests=true)"
          
      - name: 🚀 Release build info
        if: ${{ inputs.upload == true }}
        run: |
          echo "🚀 Release build completed - package validation included in conan create"
          echo "📦 Package ready for upload"

      # - uses: github/codeql-action/analyze@v2

      - name: 📦 Upload
        # if: github.event_name == 'push' && needs.check.outputs.permitted == 'true'
        if: ${{ inputs.upload }}
        run: |
          conan remote login -p ${{ secrets.CONAN_PASSWORD }} ${{ inputs.conan-remote }} ${{ secrets.CONAN_LOGIN_USERNAME }}
          conan upload ${{ inputs.recipe-name }}/${{ inputs.build-version }}@ -r ${{ inputs.conan-remote }} # --all
